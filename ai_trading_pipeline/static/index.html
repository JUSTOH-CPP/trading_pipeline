<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading Dashboard - TradingView Charts</title>
    <script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #e0e0e0;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 300px;
            grid-template-rows: 60px 1fr;
            gap: 0;
        }

        /* Header */
        header {
            grid-column: 1 / -1;
            background: rgba(0, 0, 0, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .header-left {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2em;
            color: #00ff88;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .symbol-info {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .info-label {
            color: #999;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            color: #fff;
            font-weight: 600;
            font-size: 1.1em;
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            padding: 5px 12px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
        }

        .status-indicator.offline {
            background: #ff4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Main Chart Area */
        .chart-container {
            grid-column: 1;
            grid-row: 2;
            background: #0f0f1e;
            position: relative;
            overflow: hidden;
        }

        #chart {
            width: 100%;
            height: 100%;
        }

        /* Right Sidebar */
        .sidebar {
            grid-column: 2;
            grid-row: 2;
            background: rgba(0, 0, 0, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-section {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-title {
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00ff88;
            margin-bottom: 12px;
        }

        .account-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85em;
            padding: 5px 0;
        }

        .stat-label {
            color: #999;
        }

        .stat-value {
            font-weight: 600;
            color: #fff;
        }

        .stat-value.positive {
            color: #00ff88;
        }

        .stat-value.negative {
            color: #ff4444;
        }

        /* Positions Section */
        .position {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 3px solid #00ff88;
            font-size: 0.8em;
        }

        .position.sell {
            border-left-color: #ff4444;
        }

        .position-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .position-detail {
            display: flex;
            justify-content: space-between;
            color: #bbb;
            margin: 2px 0;
        }

        .position-profit {
            color: #00ff88;
            font-weight: 600;
        }

        .position-profit.negative {
            color: #ff4444;
        }

        /* Loading and Error States */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
        }

        .error {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            padding: 15px;
            border-radius: 4px;
            margin: 15px;
            font-size: 0.85em;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        /* Scrollbar Styling */
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 136, 0.3);
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 136, 0.5);
        }

        /* Tooltip/Notification */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.5);
            padding: 12px 16px;
            border-radius: 4px;
            color: #00ff88;
            font-size: 0.85em;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        .notification.error {
            background: rgba(255, 68, 68, 0.2);
            border-color: rgba(255, 68, 68, 0.5);
            color: #ff4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                grid-column: 1;
                max-height: 200px;
                grid-row: 2;
            }

            .chart-container {
                grid-row: 2;
                position: relative;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-left">
                <div class="logo">
                    📈 AI Trading Dashboard
                </div>
                <div class="symbol-info">
                    <div class="info-item">
                        <div class="info-label">Symbol</div>
                        <div class="info-value" id="symbol">EURUSD</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Bid/Ask</div>
                        <div class="info-value" id="bid-ask">-</div>
                    </div>
                </div>
            </div>
            <div class="server-status">
                <div class="status-indicator" id="status-indicator"></div>
                <span id="status-text">Connecting...</span>
            </div>
        </header>

        <!-- Chart Area -->
        <div class="chart-container">
            <div id="chart"></div>
            <div class="loading" id="chart-loading" style="display: none;">
                Loading chart data...
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Account Info Section -->
            <div class="sidebar-section">
                <div class="sidebar-title">Account</div>
                <div class="account-stat">
                    <span class="stat-label">Balance</span>
                    <span class="stat-value" id="balance">-</span>
                </div>
                <div class="account-stat">
                    <span class="stat-label">Equity</span>
                    <span class="stat-value" id="equity">-</span>
                </div>
                <div class="account-stat">
                    <span class="stat-label">P&L</span>
                    <span class="stat-value" id="profit">-</span>
                </div>
                <div class="account-stat">
                    <span class="stat-label">Margin Used</span>
                    <span class="stat-value" id="margin">-</span>
                </div>
            </div>

            <!-- Open Positions Section -->
            <div class="sidebar-section">
                <div class="sidebar-title">Open Positions</div>
                <div id="positions-container">
                    <div style="color: #999; font-size: 0.85em; padding: 10px 0;">No open positions</div>
                </div>
            </div>

            <!-- Signals History -->
            <div class="sidebar-section">
                <div class="sidebar-title">Recent Signals</div>
                <div id="signals-container">
                    <div style="color: #999; font-size: 0.85em; padding: 10px 0;">Waiting for signals...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Include chart rendering script -->
    <script src="/static/js/chart.js"></script>
</body>
</html>
